# ============================================================================
# DO NOT APPLY THIS FILE DIRECTLY IN SANDBOX DEPLOYMENTS.
#
# This file exists as a schema/reference for required secret keys only.
# In AWS Academy sandbox, credentials rotate and must be sourced from a live
# env file on the EC2 host.
#
# Use this command instead:
# sudo k3s kubectl create secret generic skyvault-secrets \
#   --from-env-file=/home/ec2-user/skyvault.env -n skyvault
#
# For idempotent updates, use:
# sudo k3s kubectl create secret generic skyvault-secrets \
#   --from-env-file=/home/ec2-user/skyvault.env -n skyvault \
#   --dry-run=client -o yaml | sudo k3s kubectl apply -f -
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  # Secret name referenced by backend deployment envFrom.secretRef.
  name: skyvault-secrets
  namespace: skyvault
type: Opaque
stringData:
  # Express HTTP port inside the backend container.
  PORT: "5000"
  # Runtime mode for production deployment behavior.
  NODE_ENV: "production"
  # MongoDB Atlas connection string.
  MONGODB_URI: "replace-with-atlas-uri"
  # JWT signing secret used by auth routes.
  JWT_SECRET: "replace-with-jwt-secret"
  # AWS region is fixed to us-east-1 in sandbox.
  AWS_REGION: "us-east-1"
  # Temporary sandbox access key.
  AWS_ACCESS_KEY_ID: "replace-with-access-key-id"
  # Temporary sandbox secret key.
  AWS_SECRET_ACCESS_KEY: "replace-with-secret-access-key"
  # Temporary sandbox session token (required in sandbox).
  AWS_SESSION_TOKEN: "replace-with-session-token"
  # S3 bucket that stores file binaries.
  S3_BUCKET_NAME: "skyvault-files-your-unique-suffix"

