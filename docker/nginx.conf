server {
	# Nginx listens on container port 80.
	listen 80;

	# Frontend static files location.
	root /usr/share/nginx/html;
	index index.html;

	# SPA route fallback for client-side routing.
	location / {
		try_files $uri $uri/ /index.html;
	}

	# Proxy API calls to backend container.
	location /api/ {
		proxy_pass http://skyvault-backend:5000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
	}

	# Enable gzip for common text payloads.
	gzip on;
	gzip_types text/plain text/css application/javascript application/json;
}

